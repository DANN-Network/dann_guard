# Bad bot/user-agent map
map $http_user_agent $bad_bot {
    default 0;
    "~*(curl|wget|python|go-http|java|php|libwww|perl|ruby|scanner|bot|crawler|spider|nmap|masscan|zmap|zgrab|nikto|sqlmap|dirb|gobuster|ffuf|wfuzz|hydra|medusa|ncrack|brute|exploit|payload|shell|backdoor|webshell|eval|base64_decode|system|exec|passthru|shell_exec|proc_open|popen|assert|create_function|extract|parse_str|import_request_variables)" 1;
}

# Known bad referrers
map $http_referer $bad_referer {
    default 0;
    "~*(semalt|buttons-for-website|darodar|priceg|makemoneyonline|blackhatworth|hulfingtonpost|best-seo|o-o-6-o-o|humanorightswatch|100dollars-seo|buy-cheap-online|forum69|seoexperimenty|edakgfvwql|savetubevideo|kambasoft)" 1;
}

# Current IP subnet (first 2 octets)
map $remote_addr $current_ip_hash {
    default "";
    "~^(\d+\.\d+)" "$1";
}

# Check clearance: ddos_clearance cookie = device_id:ip_subnet
# Must match current device_id cookie AND current IP subnet
map "$cookie_ddos_clearance:$cookie_device_id:$current_ip_hash" $clearance_ok {
    default 0;
    "~*^([^:]+):([^:]+):\1:\2$" 1;
}

# Internal/localhost bypass
map $remote_addr $is_internal {
    default 0;
    127.0.0.1 1;
    ::1 1;
}
